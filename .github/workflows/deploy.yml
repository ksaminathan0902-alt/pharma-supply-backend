name: Deploy Inventory Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /var/www/hms-inventory-backend
            git pull origin main
            npm ci --omit=dev
            npx prisma generate
            npx prisma migrate deploy || true
            pm2 restart hms-inventory-backend || pm2 start src/index.js --name hms-inventory-backend
