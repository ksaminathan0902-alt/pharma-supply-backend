name: Deploy Inventory Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "src/,prisma/,package.json,package-lock.json"
          target: /home/ubuntu/inventory-backend
          strip_components: 0

      - name: Install, migrate and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/inventory-backend

            # Setup DB and dedicated user via sudo mysql
            sudo mysql -e "CREATE DATABASE IF NOT EXISTS hms_inventory CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
            sudo mysql -e "CREATE USER IF NOT EXISTS 'inv_user'@'localhost' IDENTIFIED BY 'InvPass2026';"
            sudo mysql -e "GRANT ALL PRIVILEGES ON hms_inventory.* TO 'inv_user'@'localhost'; FLUSH PRIVILEGES;"

            # Always write .env with correct credentials
            printf 'DATABASE_URL=mysql://inv_user:InvPass2026@localhost:3306/hms_inventory\nJWT_SECRET=inventory_super_secret_jwt_2026\nPORT=5001\n' > .env

            npm install --omit=dev
            npx prisma generate
            npx prisma migrate deploy || true

            pm2 describe hms-inventory-backend > /dev/null 2>&1 \
              && pm2 restart hms-inventory-backend \
              || pm2 start src/index.js --name hms-inventory-backend

            pm2 save

            sleep 2
            curl -sf http://localhost:5001/api/health && echo "✅ Inventory backend deployed OK"
